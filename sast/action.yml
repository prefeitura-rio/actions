name: SAST Scanners action
description: Run Static Analysis and summarize results

inputs:
  wait_pipeline:
    required: false
    default: "true"
  break_on:
    required: false
    default: "HIGH"
  enable_clippy:
    required: false
    default: "false"
  sonarqube_opts:
    required: false
    default: ""
  override_branch:
    required: false
    default: ""
  sonar_url:
    required: false
    default: ""
  sonar_token:
    required: false
    default: ""
  dd_url:
    required: false
    default: ""
  dd_token:
    required: false
    default: ""
  ignore_type:
    required: false
    default: "sonarqube"
  enable_checkov:
    description: Run checkov infrastructure-as-code scanning
    required: false
    default: "true"
  checkov_version:
    required: false
    default: "3.3.8"
  checkov_opts:
    description: Extra arguments passed to checkov (e.g. --skip-path node_modules --skip-check CKV_DOCKER_2)
    required: false
    default: ""
  ts_tags:
    description: Tailscale tags
    required: true
  ts_oauth_client_id:
    description: Tailscale OAuth client ID
    required: true
  ts_oauth_secret:
    description: Tailscale OAuth secret
    required: true

runs:
  using: composite
  steps:
    - name: Tailscale connect
      uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
      with:
        oauth-client-id: ${{ inputs.ts_oauth_client_id }}
        oauth-secret: ${{ inputs.ts_oauth_secret }}
        tags: ${{ inputs.ts_tags }}
    - name: Detect Rust
      id: rust
      shell: bash
      run: |
        if find . -name Cargo.toml -print -quit | grep -q .; then
          echo "found=true" >> $GITHUB_OUTPUT
        else
          echo "found=false" >> $GITHUB_OUTPUT
        fi
    - name: Detect Java
      id: java
      shell: bash
      run: |
        if find . -maxdepth 2 -name "pom.xml" -o -name "build.gradle" -o -name "build.gradle.kts" | grep -q .; then
          echo "found=true" >> $GITHUB_OUTPUT
        else
          echo "found=false" >> $GITHUB_OUTPUT
        fi
    - name: Install Rust toolchain
      if: steps.rust.outputs.found == 'true'
      shell: bash
      run: |
        set -e
        if ! command -v cargo >/dev/null 2>&1; then
          echo "Installing Rust via rustup..."
          curl https://sh.rustup.rs -sSf | sh -s -- -y
        fi
        export PATH="$HOME/.cargo/bin:$PATH"
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        rustup component add clippy
    - name: Setup environment
      if: always()
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        cache: 'pip'
        python-version: ''
    - name: Prepare tool cache
      id: tools
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        COSIGN_VERSION=3.1.1
        OPENGREP_VERSION=1.23.0
        SYFT_VERSION=1.46.0
        GRYPE_VERSION=0.115.0
        CHECKOV_VERSION="${{ inputs.checkov_version }}"
        TOOL_DIR="$HOME/.sast-tools"
        PY_VERSION=$(python3 -c 'import sys; print("%d.%d.%d" % sys.version_info[:3])')

        mkdir -p "$TOOL_DIR/bin" "$TOOL_DIR/dl"
        echo "$TOOL_DIR/bin" >> "$GITHUB_PATH"

        {
          echo "TOOL_DIR=$TOOL_DIR"
          echo "TOOL_BIN=$TOOL_DIR/bin"
          echo "TOOL_DL=$TOOL_DIR/dl"
          echo "COSIGN_VERSION=$COSIGN_VERSION"
          echo "OPENGREP_VERSION=$OPENGREP_VERSION"
          echo "SYFT_VERSION=$SYFT_VERSION"
          echo "GRYPE_VERSION=$GRYPE_VERSION"
          echo "CHECKOV_VERSION=$CHECKOV_VERSION"
        } >> "$GITHUB_ENV"

        echo "dir=$TOOL_DIR" >> "$GITHUB_OUTPUT"
        echo "key=sast-tools-$(uname -s)-$(uname -m)-cosign${COSIGN_VERSION}-opengrep${OPENGREP_VERSION}-syft${SYFT_VERSION}-grype${GRYPE_VERSION}-checkov${CHECKOV_VERSION}-py${PY_VERSION}" >> "$GITHUB_OUTPUT"
    - name: Restore tool cache
      if: always()
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.tools.outputs.dir }}
        key: ${{ steps.tools.outputs.key }}
    - name: Install scanner tools
      if: always()
      shell: bash
      env:
        ENABLE_CHECKOV: ${{ inputs.enable_checkov }}
      run: |
        set -euo pipefail

        fetch() {
          local name="$1" url="$2" sha="$3" out="$TOOL_DL/$1" downloaded=1
          if [[ ! -f "$out" ]] || ! echo "$sha  $out" | sha256sum -c --status; then
            curl -sfL "$url" -o "$out"
            downloaded=0
          fi
          if ! echo "$sha  $out" | sha256sum -c --status; then
            echo "::error title=SAST::checksum mismatch for $name from $url"
            rm -f "$out"
            exit 1
          fi
          return $downloaded
        }

        # cosign (pinned sha256 only: it is the root of trust for the others)
        fetch cosign "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64" \
          ae1ecd212663f3693ad9edf8b1a183900c9a52d3155ba6e354237f9a0f6463fc || true
        install -m 0755 "$TOOL_DL/cosign" "$TOOL_BIN/cosign"

        # opengrep
        if fetch opengrep "https://github.com/opengrep/opengrep/releases/download/v${OPENGREP_VERSION}/opengrep_manylinux_x86" \
          1f06548af379ab6080698a609612890ffad2d92dc2172f1e97d38d48096d5ef8; then
          fetch opengrep.sig "https://github.com/opengrep/opengrep/releases/download/v${OPENGREP_VERSION}/opengrep_manylinux_x86.sig" \
            61b2beb453f965c0f37c799964fa5cbe556bd9042141a7b44e8dcd01e9eab56e || true
          fetch opengrep.cert "https://github.com/opengrep/opengrep/releases/download/v${OPENGREP_VERSION}/opengrep_manylinux_x86.cert" \
            9eba8a14e840790e1e7b456e2b7b83a63ad7f1b6b3fd46989881db64c87755b0 || true
          "$TOOL_BIN/cosign" verify-blob \
            --cert "$TOOL_DL/opengrep.cert" \
            --signature "$TOOL_DL/opengrep.sig" \
            --certificate-identity-regexp "https://github.com/opengrep/opengrep.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$TOOL_DL/opengrep"
        fi
        install -m 0755 "$TOOL_DL/opengrep" "$TOOL_BIN/opengrep"

        # syft
        SYFT_BASE_URL="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/"
        if fetch "syft.tar.gz" "${SYFT_BASE_URL}syft_${SYFT_VERSION}_linux_amd64.tar.gz" \
          d654f678b709eb53c393d38519d5ed7d2e57205529404018614cfefa0fb2b5ca; then
          fetch syft-checksums.txt.pem "${SYFT_BASE_URL}syft_${SYFT_VERSION}_checksums.txt.pem" \
            9cbba2c86a26e4e2ead8d45d6831369dfb63e507b2062605cc108e42946fc029 || true
          fetch syft-checksums.txt.sig "${SYFT_BASE_URL}syft_${SYFT_VERSION}_checksums.txt.sig" \
            66711110e4d351b66ad1e8bcae1057dbad1a7d1dfbae57d65c94fb23f59acf49 || true
          fetch syft-checksums.txt "${SYFT_BASE_URL}syft_${SYFT_VERSION}_checksums.txt" \
            2fefc202b2eccab83888cc91f5a364a75df0dd777afbbae5b5e23ebd93d81ac6 || true
          "$TOOL_BIN/cosign" verify-blob "$TOOL_DL/syft-checksums.txt" \
            --certificate "$TOOL_DL/syft-checksums.txt.pem" \
            --signature "$TOOL_DL/syft-checksums.txt.sig" \
            --certificate-identity-regexp 'https://github\.com/anchore/syft/\.github/workflows/.+' \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
        fi
        tar -C "$TOOL_BIN" -xzf "$TOOL_DL/syft.tar.gz" syft
        chmod +x "$TOOL_BIN/syft"

        # grype
        GRYPE_BASE_URL="https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/"
        if fetch "grype.tar.gz" "${GRYPE_BASE_URL}grype_${GRYPE_VERSION}_linux_amd64.tar.gz" \
          3fad92940650e514c0aa2dad83526942a055e210cec09a8a59d9c024adc2b90e; then
          fetch grype-checksums.txt.pem "${GRYPE_BASE_URL}grype_${GRYPE_VERSION}_checksums.txt.pem" \
            86fd326dea67e29c237fd257fa2dfda127be3192c2ccaeed26b6ebb9bf3387a3 || true
          fetch grype-checksums.txt.sig "${GRYPE_BASE_URL}grype_${GRYPE_VERSION}_checksums.txt.sig" \
            5048c3b0bee9292c23fe1c19dbd52797b3881683db40689868e937f973ec60a7 || true
          fetch grype-checksums.txt "${GRYPE_BASE_URL}grype_${GRYPE_VERSION}_checksums.txt" \
            dce654b6f5185d6e4e31cbdd966056562808c0d82b0acc233e9af03e1d4de2b8 || true
          "$TOOL_BIN/cosign" verify-blob "$TOOL_DL/grype-checksums.txt" \
            --certificate "$TOOL_DL/grype-checksums.txt.pem" \
            --signature "$TOOL_DL/grype-checksums.txt.sig" \
            --certificate-identity-regexp 'https://github\.com/anchore/grype/\.github/workflows/.+' \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
        fi
        tar -C "$TOOL_BIN" -xzf "$TOOL_DL/grype.tar.gz" grype
        chmod +x "$TOOL_BIN/grype"

        # checkov (venv lives in the cached dir, so a cache hit skips pip entirely)
        if [[ "$ENABLE_CHECKOV" == "true" ]]; then
          if [[ "$("$TOOL_DIR/venv/bin/checkov" --version 2>/dev/null || true)" != "$CHECKOV_VERSION" ]]; then
            rm -rf "$TOOL_DIR/venv"
            python3 -m venv "$TOOL_DIR/venv"
            "$TOOL_DIR/venv/bin/pip" install --quiet --disable-pip-version-check "checkov==${CHECKOV_VERSION}"
          fi
          ln -sf "$TOOL_DIR/venv/bin/checkov" "$TOOL_BIN/checkov"
        fi
    - name: Normalize ignore files
      shell: bash
      env:
        IGNORE_TYPE: ${{ inputs.ignore_type || 'all' }}
      run: |
        export FILE_SEMGREP=".semgrepignore"
        export FILE_SONAR="sonar-project.properties"
        sonar_to_semgrep() {
          local file="$FILE_SONAR"
          if [[ ! -f "$file" ]]; then
            echo "File not found: $file"
            exit 1
          fi
          exclusions=$(
            awk '
              BEGIN { collecting=0 }
              /^[[:space:]]*#/ { next }

              /^(sonar\.exclusions|sonar\.test\.exclusions|sonar\.coverage\.exclusions|sonar\.tests)=/ {
                collecting=1
                sub(/^[^=]+= */, "")
              }

              collecting {
                gsub(/\\$/, "")   # remove trailing backslash
                printf "%s", $0

                if ($0 !~ /\\$/) {
                  printf "\n"
                  collecting=0
                }
              }
            ' "$file" \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep -v '^$' \
            | sort -u
          )

          {
            echo "# Auto-generated from sonar-project.properties"
            echo ""
            echo "$exclusions"
          } > $FILE_SEMGREP

          echo "Generated $FILE_SEMGREP"
        }

        semgrep_to_sonar() {
          local file="$FILE_SEMGREP"

          if [[ ! -f "$file" ]]; then
            echo "File not found: $file"
            exit 1
          fi

          exclusions=$(
            grep -v '^[[:space:]]*#' "$file" \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep -v '^$' \
            | sort -u \
            | paste -sd "," -
          )

          {
            echo "# Auto-generated from $FILE_SEMGREP"
            echo ""
            echo "sonar.exclusions=$exclusions"
          } > $FILE_SONAR

          echo "Generated $FILE_SONAR"
        }
        if [[ -f "$FILE_SEMGREP" && ! -f "$FILE_SONAR" ]]; then
            semgrep_to_sonar
        fi
        if [[ -f "$FILE_SONAR" && ! -f "$FILE_SEMGREP" ]]; then
            sonar_to_semgrep
        fi
    - name: Run opengrep
      if: always()
      shell: bash
      run: |
        opengrep scan . --sarif-output=all-opengrep-sarif.sarif \
          --json-output=opengrep-report.json \
          --config ${{ github.action_path }}/opengrep-rules/ \
          --opengrep-ignore-pattern NOSONAR
        jq -c '.runs[].results |= map(select((.suppressions // [] | map(.kind == "inSource") | any | not)))' all-opengrep-sarif.sarif > opengrep-sarif.sarif
        rm all-opengrep-sarif.sarif
    - name: Run Vulnerability scan & collect sbom
      if: always()
      shell: bash
      env:
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        CURRENT_BRANCH: ${{ github.ref_name }}
        DD_URL: ${{ inputs.dd_url || '' }}
        DD_API_TOKEN: ${{ inputs.dd_token || '' }}
        PRODUCT_NAME: ${{ github.repository }}
        ENGAGEMENT_NAME: "${{ inputs.override_branch || github.ref_name }}"
      run: |
        touch grype-results.sarif
        syft . -o cyclonedx-json=cdx.json && grype sbom:cdx.json -o table -o sarif=grype-results.sarif -o cyclonedx-json=cdx2.json -o json=grype-report.json
        if [ -n "$DD_API_TOKEN" ] && [ "$CURRENT_BRANCH" = "$DEFAULT_BRANCH" ]; then
          cat cdx2.json | jq '
            .vulnerabilities += [
              .components[] | {
                "id": ("INFO-" + .name),
                "source": { "name": "Not-A-Vuln" },
                "ratings": [{
                  "severity": "info",
                  "method": "other"
                }],
                "description": "This is just an info severity for tracking packages.",
                "affects": [{ "ref": (.["bom-ref"] // .purl) }]
              }
            ]' > bom_with_info.json
          echo "Uploading to defectdojo..."
          PRODUCT_INFO=$(curl -s -X GET "$DD_URL/api/v2/products/?name=${PRODUCT_NAME}" \
            -H "Authorization: Token $DD_API_TOKEN")
          PRODUCT_INFO=$(echo -n "${PRODUCT_INFO}" | tr -d '\000-\037')
          COUNT=$(echo "$PRODUCT_INFO" | jq '.count')

          if [ "$COUNT" -gt 0 ]; then
              PRODUCT_TYPE_ID=$(echo "$PRODUCT_INFO" | jq '.results[0].prod_type')
              PARAM_TYPE="product_type=$PRODUCT_TYPE_ID"
          else
              echo "Creating product on defectdojo"
              PARAM_TYPE="product_type_name=Uncategorized"
          fi
          # Import SBOM as INFO
          RESPONSE=$(curl -s -X POST "$DD_URL/api/v2/reimport-scan/" \
            -H "Authorization: Token $DD_API_TOKEN" \
            -H "Content-Type: multipart/form-data" \
            -F "active=true" \
            -F "verified=true" \
            -F "scan_type=CycloneDX Scan" \
            -F "product_name=$PRODUCT_NAME" \
            -F "engagement_name=$ENGAGEMENT_NAME" \
            -F "file=@bom_with_info.json" \
            -F "${PARAM_TYPE}" \
            -F "auto_create_context=true" \
            -F "close_old_findings=true")
          if echo "$RESPONSE" | grep -q '"test":'; then
              echo "Scan reimported"
          else
              echo "Error reimporting to dojo:"
              echo "$RESPONSE"
          fi
          # Import Grype output
          RESPONSE=$(curl -s -X POST "$DD_URL/api/v2/reimport-scan/" \
            -H "Authorization: Token $DD_API_TOKEN" \
            -H "Content-Type: multipart/form-data" \
            -F "active=true" \
            -F "verified=true" \
            -F "scan_type=Anchore Grype" \
            -F "product_name=$PRODUCT_NAME" \
            -F "engagement_name=$ENGAGEMENT_NAME" \
            -F "file=@grype-report.json" \
            -F "${PARAM_TYPE}" \
            -F "auto_create_context=true" \
            -F "close_old_findings=true")
          if echo "$RESPONSE" | grep -q '"test":'; then
              echo "Grype scan reimported"
          else
              echo "Error reimporting grype to dojo:"
              echo "$RESPONSE"
          fi
        fi
    - name: Run checkov (IaC)
      if: always()
      shell: bash
      env:
        ENABLE_CHECKOV: ${{ inputs.enable_checkov }}
        CHECKOV_OPTS: ${{ inputs.checkov_opts }}
      run: |
        set -o pipefail
        # SonarQube fails the analysis on a sarifReportPaths entry it cannot read,
        # so checkov-sarif.sarif must exist even when checkov is off or finds nothing.
        echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[]}' > checkov-sarif.sarif
        echo '{"results":{"failed_checks":[]}}' > checkov-report.json

        if [[ "$ENABLE_CHECKOV" != "true" ]]; then
          echo "checkov disabled, skipping"
          exit 0
        fi

        #   CKV_GHA_3 flags any run line containing the raw substrings "curl" and
        #     "secret" (e.g. `curl -H "Authorization: Bearer $MY_SECRET"` sourced from
        #     an env: mapped secret, the recommended-safe pattern). Real interpolation
        #     risk is already covered precisely by CKV_GHA_2 (shell injection), kept on.
        #   CKV_GHA_5 / CKV_GHA_6 flag any docker/build step lacking a later
        #     `cosign sign` / `cosign ... sbom` string in the same job
        #   CKV_GHA_7 flags any workflow_dispatch with inputs, which is the standard
        # Extend via checkov_opts; --skip-check is cumulative (argparse action=append),
        # so a caller-supplied --skip-check adds to this list instead of replacing it.
        checkov -d . \
          --quiet --compact --soft-fail --skip-download \
          --skip-check CKV_GHA_3,CKV_GHA_5,CKV_GHA_6,CKV_GHA_7 \
          -o cli -o sarif -o json \
          --output-file-path console,checkov-sarif.sarif,checkov-report.json \
          $CHECKOV_OPTS
        exit 0
    - name: 'Set up OpenJDK (Temurin) 24'
      if: steps.java.outputs.found == 'true'
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
      with:
        distribution: 'temurin'
        java-version: '24'
    - name: Set up Maven
      if: steps.java.outputs.found == 'true'
      uses: stCarolas/setup-maven@12eb41b233df95d49b0c11fc1b5bc8312e5d4ce0
      with:
        maven-version: 3.9.12
    - name: Build Classes
      if: steps.java.outputs.found == 'true'
      shell: bash
      run: mvn clean compile
    - name: Restore SonarQube scanner cache
      if: inputs.sonar_url && inputs.sonar_token
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.sonar/cache
        key: sonar-scanner-${{ runner.os }}-${{ inputs.sonar_url }}
        restore-keys: |
          sonar-scanner-${{ runner.os }}-
    - name: SonarQube
      if: inputs.sonar_url && inputs.sonar_token
      # NOSONAR: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
      uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
      with:
        args: >
          "-Dsonar.projectName=${{ github.repository }}"
          -Dsonar.projectKey=repo:${{ github.repository_id }}
          -Dsonar.qualitygate.wait=${{ inputs.wait_pipeline || 'true' }}
          -Dsonar.sarifReportPaths=grype-results.sarif,opengrep-sarif.sarif,checkov-sarif.sarif
          ${{ github.event_name == 'pull_request' && 
          format('-Dsonar.pullrequest.key={0} -Dsonar.pullrequest.branch={1} -Dsonar.pullrequest.base={2}',
          github.event.pull_request.number,
          github.event.pull_request.head.ref,
          github.event.pull_request.base.ref) ||
          format('-Dsonar.branch.name={0}', inputs.override_branch || github.ref_name )
          }}
          -Dsonar.rust.clippy.enabled=${{ inputs.enable_clippy || 'false' }}
          ${{ steps.java.outputs.found == 'true' && '-Dsonar.java.binaries=**/target/classes' || '' }}
          ${{ inputs.sonarqube_opts }}
      env:
        SONAR_TOKEN: ${{ inputs.sonar_token }}
        SONAR_HOST_URL: ${{ inputs.sonar_url }}
    - name: Find Sonar task ID
      id: sonar_task_id_step
      shell: bash
      run: |
        echo "Searching for report-task.txt file..."
        REPORT_TASK_FILE=$(find . -name 'report-task.txt' | head -n1)
        [ -f "$REPORT_TASK_FILE" ] || echo "repot-task.txt file was not found."
        #[ -f "$REPORT_TASK_FILE" ] && echo "report-task.txt content:" && cat "$REPORT_TASK_FILE"
        [ -f "$REPORT_TASK_FILE" ] && echo "Sonar report file: $REPORT_TASK_FILE"
        [ -f "$REPORT_TASK_FILE" ] && SONAR_TASK_ID=$(grep 'ceTaskId=' "$REPORT_TASK_FILE" | cut -d'=' -f2)
        [ "" == "$SONAR_TASK_ID" ] && echo "Sonar task ID was not found."
        [ "" != "$SONAR_TASK_ID" ] && echo "Sonar task ID: $SONAR_TASK_ID"
        echo "sonar_task_id=$SONAR_TASK_ID" >> "$GITHUB_OUTPUT"
    - name: Get Sonar analysis result file
      continue-on-error: true
      shell: bash
      env:
        SONAR_TOKEN: ${{ inputs.sonar_token }}
        SONAR_HOST_URL: ${{ inputs.sonar_url }}
      run: |
        set +e
        SONAR_TASK_ID=${{ steps.sonar_task_id_step.outputs.sonar_task_id }}
        [ "" == "$SONAR_TASK_ID" ] && echo "Missing Sonar task ID."
        [ "" == "${SONAR_TOKEN}" ] && echo "Missing Sonar token."
        [ "" != "$SONAR_TASK_ID" ] && [ "" != "${SONAR_TOKEN}" ] && wget -X GET --header="Authorization: Bearer ${SONAR_TOKEN}" -O sonar.status.json "${SONAR_HOST_URL}/api/ce/task?id=$SONAR_TASK_ID"
        [ -f sonar.status.json ] && echo "Sonar status: " && cat sonar.status.json && echo
        [ -f sonar.status.json ] && SONAR_ANALYSIS_ID=$(cat sonar.status.json | jq '.task.analysisId' | tr -d '"')
        echo "SONAR_ANALYSIS_ID=$SONAR_ANALYSIS_ID"
        [ "" != "$SONAR_ANALYSIS_ID" ] && [ "" != "${SONAR_TOKEN}" ] && wget -v -X GET --header="Authorization: Bearer ${SONAR_TOKEN}" -O sonar.result.json "${SONAR_HOST_URL}/api/qualitygates/project_status?analysisId=$SONAR_ANALYSIS_ID"
        GET_RESULT_CODE=$?
        echo "GET_RESULT_CODE=$GET_RESULT_CODE"
        [ -f sonar.result.json ] && echo "Sonar result:" && cat sonar.result.json || echo "No Sonar result JSON file created."
        # If the output file contains only the returned error message delete it so the evidence creation step won't try to create an evidence out of it.
        [ $GET_RESULT_CODE -ne 0 ] && rm sonar.result.json
        # return 0 if GET_RESULT_CODE is 0
        [ $GET_RESULT_CODE -eq 0 ]
    - name: Showing issues to summary
      if: always()
      shell: bash
      env:
        SONAR_TOKEN: ${{ inputs.sonar_token }}
        PROJECT_KEY: repo:${{ github.repository_id }}
        BREAK_ON: ${{ inputs.break_on || 'HIGH' }}
        BRANCH_KEY: ${{ github.event_name == 'pull_request' && 'pullRequest' || 'branch' }}
        BRANCH_VALUE: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || (inputs.override_branch || github.ref_name) }}
        SONAR_HOST_URL: ${{ inputs.sonar_url }}
        SONAR_HOST_URL_PUBLIC: ${{ inputs.sonar_url }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        CURRENT_BRANCH: ${{ github.ref_name }}
        DD_URL: ${{ inputs.dd_url || '' }}
        DD_API_TOKEN: ${{ inputs.dd_token || '' }}
        PRODUCT_NAME: ${{ github.repository }}
        ENGAGEMENT_NAME: "${{ inputs.override_branch || github.ref_name }}"
        ENABLE_CHECKOV: ${{ inputs.enable_checkov }}
      run: |
        # Import sonarqube, opengrep and checkov to defectdojo
        if [ -n "$DD_API_TOKEN" ] && [ "$CURRENT_BRANCH" = "$DEFAULT_BRANCH" ]; then
          PRODUCT_INFO=$(curl -s -X GET "$DD_URL/api/v2/products/?name=${PRODUCT_NAME}" \
            -H "Authorization: Token $DD_API_TOKEN")
          PRODUCT_INFO=$(echo -n "${PRODUCT_INFO}" | tr -d '\000-\037')
          COUNT=$(echo "$PRODUCT_INFO" | jq '.count')
          if [ "$COUNT" -gt 0 ]; then
              PRODUCT_TYPE_ID=$(echo "$PRODUCT_INFO" | jq '.results[0].prod_type')
              PARAM_TYPE="product_type=$PRODUCT_TYPE_ID"
          else
              echo "Creating product on defectdojo"
              PARAM_TYPE="product_type_name=Uncategorized"
          fi
          # opengrep
          RESPONSE=$(curl -s -X POST "$DD_URL/api/v2/reimport-scan/" \
            -H "Authorization: Token $DD_API_TOKEN" \
            -H "Content-Type: multipart/form-data" \
            -F "active=true" \
            -F "verified=true" \
            -F "scan_type=Semgrep JSON Report" \
            -F "product_name=$PRODUCT_NAME" \
            -F "engagement_name=$ENGAGEMENT_NAME" \
            -F "file=@opengrep-report.json" \
            -F "${PARAM_TYPE}" \
            -F "auto_create_context=true" \
            -F "close_old_findings=true")
          if echo "$RESPONSE" | grep -q '"test":'; then
              echo "Opengrep scan reimported"
          else
              echo "Error reimporting opengrep to dojo:"
              echo "$RESPONSE"
          fi
          # checkov
          if [ "$ENABLE_CHECKOV" = "true" ] && [ -f checkov-report.json ]; then
            RESPONSE=$(curl -s -X POST "$DD_URL/api/v2/reimport-scan/" \
              -H "Authorization: Token $DD_API_TOKEN" \
              -H "Content-Type: multipart/form-data" \
              -F "active=true" \
              -F "verified=true" \
              -F "scan_type=Checkov Scan" \
              -F "product_name=$PRODUCT_NAME" \
              -F "engagement_name=$ENGAGEMENT_NAME" \
              -F "file=@checkov-report.json" \
              -F "${PARAM_TYPE}" \
              -F "auto_create_context=true" \
              -F "close_old_findings=true")
            if echo "$RESPONSE" | grep -q '"test":'; then
                echo "Checkov scan reimported"
            else
                echo "Error reimporting checkov to dojo:"
                echo "$RESPONSE"
            fi
          fi
          # sonarqube
          # DefectDojo's "SonarQube Scan detailed" parser reads the REST API JSON
          # (top-level "paging" + "components"), i.e. the /api/issues/search payload.
          # We build it here and drop external_* rules (the grype/opengrep SARIF
          # imports) so they are not duplicated against their direct DD imports.
          if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ]; then
            rm -f sonar_page_*.json sonar-issues.json
            p=1
            while :; do
              curl -s -u "$SONAR_TOKEN:" \
                "$SONAR_HOST_URL/api/issues/search?components=$PROJECT_KEY&${BRANCH_KEY}=${BRANCH_VALUE}&issueStatuses=OPEN&types=VULNERABILITY&additionalFields=_all&ps=500&p=$p" \
                > "sonar_page_$p.json"
              TOTAL=$(jq '.paging.total // .total // 0' "sonar_page_$p.json")
              PS=$(jq '.paging.pageSize // 500' "sonar_page_$p.json")
              [ $((p * PS)) -ge "$TOTAL" ] && break
              p=$((p + 1))
              [ "$p" -gt 20 ] && break   # SonarQube caps issue search at 10000
            done
            jq -s '{
              total: (.[0].paging.total // .[0].total // 0),
              paging: (.[0].paging // {total: (.[0].total // 0)}),
              components: (map(.components // []) | add | unique_by(.key)),
              rules: (map(.rules // []) | add | unique_by(.key)),
              issues: (map(.issues // []) | add
                        | map(select((.rule // "") | startswith("external_") | not)))
            }' sonar_page_*.json > sonar-issues.json
            rm -f sonar_page_*.json
            echo "SonarQube native issues to upload (external_* excluded): $(jq '.issues | length' sonar-issues.json)"
            RESPONSE=$(curl -s -X POST "$DD_URL/api/v2/reimport-scan/" \
              -H "Authorization: Token $DD_API_TOKEN" \
              -H "Content-Type: multipart/form-data" \
              -F "active=true" \
              -F "verified=true" \
              -F "scan_type=SonarQube Scan detailed" \
              -F "product_name=$PRODUCT_NAME" \
              -F "engagement_name=$ENGAGEMENT_NAME" \
              -F "file=@sonar-issues.json" \
              -F "${PARAM_TYPE}" \
              -F "auto_create_context=true" \
              -F "close_old_findings=true")
            if echo "$RESPONSE" | grep -q '"test":'; then
                echo "Sonarqube scan reimported"
            else
                echo "Error reimporting sonarqube to dojo:"
                echo "$RESPONSE"
            fi
          else
              echo "::warning title=SAST::Skipping SonarQube DefectDojo upload: SONAR_TOKEN/SONAR_HOST_URL not set"
          fi
        fi
        MAX_RESULTS=200
        if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ]; then
          for i in {1..6}; do
            COUNT=$(curl -s -u $SONAR_TOKEN: \
              "$SONAR_HOST_URL/api/issues/search?components=$PROJECT_KEY&${BRANCH_KEY}=${BRANCH_VALUE}&issueStatuses=OPEN&ps=1" \
              | jq '.total')

            [ "$COUNT" -ge 0 ] && break
            sleep 10
          done

          RESPONSE=$(curl -s -u $SONAR_TOKEN: \
            "$SONAR_HOST_URL/api/issues/search?components=$PROJECT_KEY&${BRANCH_KEY}=${BRANCH_VALUE}&issueStatuses=OPEN&types=VULNERABILITY&ps=$MAX_RESULTS")

          TOTAL=$(echo "$RESPONSE" | jq '.total')

          if [ "$TOTAL" -eq 0 ]; then
              echo "No new security issues" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
          fi

          TOTAL_CRITICAL=$(echo $RESPONSE | jq -r '.issues | map(select(.severity == "CRITICAL")) | length')
          TOTAL_HIGH=$(echo $RESPONSE | jq -r '.issues | map(select(.severity == "HIGH")) | length')
          TOTAL_MEDIUM=$(echo $RESPONSE | jq -r '.issues | map(select(.severity == "MEDIUM")) | length')
          TOTAL_LOW=$(echo $RESPONSE | jq -r '.issues | map(select(.severity == "LOW")) | length')

          SONAR_ISSUES=$(echo "$RESPONSE" | jq '
              .issues
              | unique_by(.key)
              | map(select(.rule | contains("external_grype") | not ))
          ')

          if [ "$(echo "$SONAR_ISSUES" | jq 'length')" -gt 0 ]; then
              echo "### Sonar Security Findings" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Issue | File | Rule | Severity |" >> $GITHUB_STEP_SUMMARY
              echo "|------|------|------|-----------|" >> $GITHUB_STEP_SUMMARY

              echo "$SONAR_ISSUES" | jq -r '
              .[] |
              "| [" + .message + "]('"$SONAR_HOST_URL_PUBLIC"'/project/issues?id='"$PROJECT_KEY"'&open=" + .key + ") | " +
              (.component | split(":")[-1]) + ":"+((.line // "please check output") | tostring)+" | " +
              .rule + " |" + .severity +" |"
              ' >> $GITHUB_STEP_SUMMARY

              echo "" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        GRYPE_ISSUES=$(cat grype-results.sarif | jq '.runs[0].tool.driver.rules')
        if [[ -n "$GRYPE_ISSUES" && "$GRYPE_ISSUES" != "null" && "$GRYPE_ISSUES" != "[]" && "$(echo "$GRYPE_ISSUES" | jq 'length')" -gt 0 ]]; then
            echo "### Dependency Vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Advisory | Package | Installed | Fixed | Severity | File |" >> $GITHUB_STEP_SUMMARY
            echo "|:---|:---|:---|:---|:---|:---|" >> $GITHUB_STEP_SUMMARY

            echo "$GRYPE_ISSUES" | jq -r '
            def map_severity:
            {
                "critical": "CRITICAL",
                "high": "HIGH",
                "medium": "MEDIUM",
                "low": "LOW"
            }[.] // .;

            .[] |
            # Extração segura dos dados via Regex
            (.help.text | capture("Severity: (?<s>[^\\n]+)").s) as $raw_sev |
            (.help.text | capture("Link: \\[[^\\]]+\\]\\((?<url>[^\\)]+)\\)").url) as $url |
            (.help.text | capture("Package: (?<p>[^\\n]+)").p) as $pkg |
            (.help.text | capture("Version: (?<v>[^\\n]+)").v) as $ver |
            (.help.text | capture("Fix Version: (?<f>[^\\n]+)").f) as $fix |
            (.help.text | capture("Location: (?<l>[^\\n]+)").l) as $loc |
            (.properties["security-severity"] // "N/A") as $cvss |
            
            # Formatação da Severidade
            (($raw_sev | map_severity) + " (" + ($cvss|tostring) + ")") as $final_sev |

            # Montagem da linha na ordem correta do cabeçalho
            "| [" + .id + "](" + $url + ") | " + 
            $pkg + " | " + 
            $ver + " | " + 
            $fix + " | " + 
            $final_sev + " | " + 
            $loc + " |"
            ' >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
        fi

        # checkov results are a single object, or a list of objects when several
        # frameworks (terraform, dockerfile, github_actions, ...) match.
        if [ "$ENABLE_CHECKOV" = "true" ] && [ -f checkov-report.json ]; then
          CHECKOV_FAILED=$(jq -c '
            [ (if type == "array" then .[] else . end)
              | (.check_type // "iac") as $fw
              | (.results.failed_checks // [])[]
              | . + { check_type: $fw } ]
          ' checkov-report.json)

          if [ "$(echo "$CHECKOV_FAILED" | jq 'length')" -gt 0 ]; then
              echo "### Infrastructure as Code (checkov)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Check | Resource | File | Framework |" >> $GITHUB_STEP_SUMMARY
              echo "|:---|:---|:---|:---|" >> $GITHUB_STEP_SUMMARY

              echo "$CHECKOV_FAILED" | jq -r '
              .[] |
              (if .guideline then "[" + .check_id + "](" + .guideline + ")" else .check_id end) as $check |
              "| " + $check + ": " + (.check_name // "") + " | " +
              (.resource // "-") + " | " +
              (.file_path // "-") + ":" + ((.file_line_range[0] // "-") | tostring) + " | " +
              .check_type + " |"
              ' >> $GITHUB_STEP_SUMMARY

              echo "" >> $GITHUB_STEP_SUMMARY
          else
              echo "### Infrastructure as Code (checkov)" >> $GITHUB_STEP_SUMMARY
              echo "No IaC misconfigurations found" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ]; then
          HOTSPOTS=$(curl -s -u $SONAR_TOKEN: \
              "$SONAR_HOST_URL/api/hotspots/search?project=$PROJECT_KEY&${BRANCH_KEY}=${BRANCH_VALUE}&status=TO_REVIEW&ps=$MAX_RESULTS")
          HOTSPOT_COUNT=$(echo "$HOTSPOTS" | jq '.paging.total')

          HOTSPOTS=$(echo $HOTSPOTS | jq '.hotspots')

          if [ "$HOTSPOT_COUNT" -gt 0 ]; then
              echo "### Security Hotspots (Review Required)" >> $GITHUB_STEP_SUMMARY
              echo "| Hotspot | File | Category |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|------|----------|" >> $GITHUB_STEP_SUMMARY

              echo "$HOTSPOTS" | jq -r \
              --arg host "$SONAR_HOST_URL_PUBLIC" \
              --arg project "$PROJECT_KEY" \
              --arg branch_key "$BRANCH_KEY" \
              --arg branch_value "$BRANCH_VALUE" '
              .[] |
              "| [" + .message + "](" +
                  $host + "/security_hotspots?hotspots=" + .key +
                  "&"+$branch_key+"=" + $branch_value + "&id=" + $project +
              ") | " +
              (.component | split(":")[-1]) + ":"+((.line // "-") | tostring)+" | " +
              .securityCategory + " | "
              ' >> $GITHUB_STEP_SUMMARY

              echo "" >> $GITHUB_STEP_SUMMARY
          else
              echo "### Security Hotspots" >> $GITHUB_STEP_SUMMARY
              echo "No new security hotspots" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "[View all new security issues in SonarQube]($SONAR_HOST_URL_PUBLIC/project/issues?id=$PROJECT_KEY&${BRANCH_KEY}=${BRANCH_VALUE}&types=VULNERABILITY&sinceLeakPeriod=true)" >> $GITHUB_STEP_SUMMARY
          if [ "$BREAK_ON" == "CRITICAL" ] && [ $TOTAL_CRITICAL -gt 0 ]; then
            echo "::error title=SAST::Quality gate met CRITICAL"
            exit 1
          elif [ "$BREAK_ON" == "HIGH" ] && ( [ $TOTAL_CRITICAL -gt 0 ] ); then
            echo "::error title=SAST::Quality gate met HIGH"
            exit 1
          elif [ "$BREAK_ON" == "MEDIUM" ] && ( [ $TOTAL_CRITICAL -gt 0 ] || [ $TOTAL_MEDIUM -gt 0 ] ); then
            echo "::error title=SAST::Quality gate met MEDIUM"
            exit 1
          elif [ "$BREAK_ON" == "LOW" ] && ( [ $TOTAL_CRITICAL -gt 0 ] || [ $TOTAL_HIGH -gt 0 ] || [ $TOTAL_MEDIUM -gt 0 ] ); then
            echo "::error title=SAST::Quality gate met LOW"
            exit 1
          fi
        fi
